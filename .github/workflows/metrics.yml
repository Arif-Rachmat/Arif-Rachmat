name: Metrics
on:
  schedule: [{cron: "0 0 * * *"}]
  workflow_dispatch:
  push: {branches: ["master", "main"]}
jobs:
  github-metrics:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: lowlighter/metrics@latest
        with:
          token: ${{ secrets.METRICS_TOKEN }}
          template: classic
          filename: profile-header.svg
          output_action: gist # Redirects file creation to a gist
          committer_gist: ${{ secrets.GIST_ID }}
          base: activity, community, repositories
          config_timezone: Asia/Jakarta
          config_twemoji: yes
          extras_css: |
            .container, section, .section, .header {
              display: flex !important;
              flex-direction: column !important;
              align-items: center !important;
              text-align: center !important;
              width: 100% !important;
            }
            .row, .display-flex, .field, .chart, .metrics-grid {
              justify-content: center !important;
              text-align: center !important;
            }
            .media, .repositories, .activity, .community {
              margin-left: auto !important;
              margin-right: auto !important;
            }   
      
      - uses: lowlighter/metrics@latest
        with:
          token: ${{ secrets.METRICS_TOKEN }}
          filename: habits.svg
          output_action: gist # Redirects file creation to a gist
          committer_gist: ${{ secrets.GIST_ID }}
          base: "" # Disables default blocks
          config_timezone: Asia/Jakarta
          config_twemoji: yes
          plugin_habits: yes
          plugin_habits_charts: yes
          plugin_habits_charts_type: classic
          plugin_habits_days: 14
          plugin_habits_facts: yes
          plugin_habits_from: 200
          plugin_habits_languages_limit: 8
          plugin_habits_languages_threshold: 0%

      - uses: lowlighter/metrics@latest
        with:
          token: ${{ secrets.METRICS_TOKEN }}
          filename: isocalendar.svg
          output_action: gist # Redirects file creation to a gist
          committer_gist: ${{ secrets.GIST_ID }}
          base: "" # Disables default blocks
          config_timezone: Asia/Jakarta
          config_twemoji: yes
          plugin_isocalendar: yes
          plugin_isocalendar_duration: half-year

      - uses: lowlighter/metrics@latest
        with:
          token: ${{ secrets.METRICS_TOKEN }}
          filename: metrics-languages.svg
          output_action: gist # Redirects file creation to a gist
          committer_gist: ${{ secrets.GIST_ID }}
          base: "" # Disables the default avatar/header block
          config_timezone: Asia/Jakarta
          config_twemoji: yes
          plugin_languages: yes
          plugin_languages_analysis_timeout: 15
          plugin_languages_analysis_timeout_repositories: 7.5
          plugin_languages_categories: markup, programming
          plugin_languages_colors: github
          plugin_languages_limit: 8
          plugin_languages_recent_categories: markup, programming
          plugin_languages_recent_days: 14
          plugin_languages_recent_load: 300 
          plugin_languages_sections: most-used
          plugin_languages_threshold: 0%

      - uses: lowlighter/metrics@latest
        with:
          token: ${{ secrets.METRICS_TOKEN }}
          filename: metrics-achievements.svg
          output_action: gist # Redirects file creation to a gist
          committer_gist: ${{ secrets.GIST_ID }}
          base: "" # Disables default blocks
          config_timezone: Asia/Jakarta
          config_twemoji: yes
          plugin_achievements: yes
          plugin_achievements_display: compact
          plugin_achievements_secrets: yes
          plugin_achievements_threshold: C
          extras_css: |
            .container, section, .section, .achievements {
              display: flex !important;
              flex-direction: column !important;
              align-items: center !important;
              text-align: center !important;
              width: 100% !important;
            }
            .achievements-list, .achievements-compact, .row, .display-flex {
              display: flex !important;
              justify-content: center !important;
              flex-wrap: wrap !important;
              gap: 8px !important; /* Adds subtle spacing between badges */
              width: 100% !important;
            }

      - uses: lowlighter/metrics@latest
        with:
          token: ${{ secrets.METRICS_TOKEN }}
          filename: metrics-lines.svg
          output_action: gist # Redirects file creation to a gist
          committer_gist: ${{ secrets.GIST_ID }}
          base: "" # Disables default blocks
          config_timezone: Asia/Jakarta
          config_twemoji: yes
          plugin_lines: yes
          plugin_lines_history_limit: 1
          plugin_lines_repositories_limit: 4
          plugin_lines_sections: base